# ============================================================================
# Seema — consolidated production stack for a single VPS (app.seemaai.co.uk)
#
#   db            PostgreSQL 16   (tenant data, RLS-enforced)
#   redis         Redis 7         (Celery broker + cache)
#   api           FastAPI         (migrations + RLS bootstrap + REST API)
#   celery-worker Celery worker   (email, compliance, regulatory jobs)
#   celery-beat   Celery beat     (scheduled scrapers, chasers, digests)
#   web           Next.js         (the dashboard, standalone build)
#   caddy         Caddy 2         (reverse proxy + automatic HTTPS)
#
# All secrets come from the root .env file (see .env.example). Generate it
# once with: ./scripts/generate-secrets.sh   (or generate-secrets.ps1)
# ============================================================================

# Shared backend environment — used by api, celery-worker and celery-beat.
x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: postgresql+asyncpg://seema_app:${SEEMA_APP_PASSWORD}@db:5432/${POSTGRES_DB:-seema}
  ADMIN_DATABASE_URL: postgresql+asyncpg://seema_admin:${SEEMA_ADMIN_PASSWORD}@db:5432/${POSTGRES_DB:-seema}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  CORS_ORIGINS: '["https://${DOMAIN:-app.seemaai.co.uk}","http://localhost:3000"]'
  # --- AI (required) ---
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  # --- Clio PMS (required for integration) ---
  CLIO_CLIENT_ID: ${CLIO_CLIENT_ID:-}
  CLIO_CLIENT_SECRET: ${CLIO_CLIENT_SECRET:-}
  CLIO_REDIRECT_URI: ${CLIO_REDIRECT_URI:-https://app.seemaai.co.uk/api/integrations/clio/callback}
  # --- Optional integrations (features stay disabled while blank) ---
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@seemaai.co.uk}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPER_USER:-seema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-seema}
      # Consumed by scripts/db-init/01-roles.sh on first boot:
      SEEMA_APP_PASSWORD: ${SEEMA_APP_PASSWORD}
      SEEMA_ADMIN_PASSWORD: ${SEEMA_ADMIN_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPER_USER:-seema}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  celery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      api:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --queues=compliance,email,default --concurrency=2

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      api:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info

  web:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_URL is baked into the JS bundle at build time.
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-app.seemaai.co.uk}/api
    restart: unless-stopped
    environment:
      # Make the Next.js standalone server bind on the container network so
      # Caddy can reach it (it otherwise defaults to localhost in some builds).
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-app.seemaai.co.uk}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@seemaai.co.uk}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
