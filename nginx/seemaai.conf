# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name seemaai.co.uk www.seemaai.co.uk;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──
server {
    listen 443 ssl http2;
    server_name seemaai.co.uk www.seemaai.co.uk;

    # ── SSL certificates (Certbot / Let's Encrypt) ──
    ssl_certificate /etc/letsencrypt/live/seemaai.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seemaai.co.uk/privkey.pem;

    # ── SSL hardening ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # ── Auth routes (stricter rate limit — matched before general /api/) ──
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://node_api/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/auth/register {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://node_api/api/auth/register;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Stripe webhooks (no rate limit, needs raw body) ──
    location /api/billing/webhooks/stripe {
        proxy_pass http://node_api/api/billing/webhooks/stripe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── API routes (all → Node.js, which proxies AI routes to FastAPI internally) ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://node_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts for long-running API calls (AI analysis etc.)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 180s;

        # Don't buffer API responses
        proxy_buffering off;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://node_api/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Next.js static assets (long cache) ──
    location /_next/static/ {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Next.js image optimization ──
    location /_next/image {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 60d;
        add_header Cache-Control "public";
    }

    # ── Public static files ──
    location /favicon.ico {
        proxy_pass http://web_frontend;
        expires 30d;
        access_log off;
    }

    # ── Frontend (Next.js) ──
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
