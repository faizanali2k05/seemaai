# ── Local development — HTTP only (no SSL) ──
# Post-migration: All /api/ traffic → Node.js (which proxies AI routes to FastAPI internally)
server {
    listen 80;
    server_name localhost;

    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Auth (stricter rate limit — matched before general /api/) ──
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://node_api/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/auth/register {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://node_api/api/auth/register;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Stripe webhooks (raw body — no rate limit) ──
    location /api/billing/webhooks/stripe {
        proxy_pass http://node_api/api/billing/webhooks/stripe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Node.js API (all routes) ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://node_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://node_api/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Next.js static ──
    location /_next/static/ {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /_next/image {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Frontend ──
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
